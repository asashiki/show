<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>MCP Switch Console · 展示</title>
    <meta name="description" content="MCP Switch 管理控制台的在线展示 —— 真实前端代码 + 样例数据，无需后端。" />
    <meta name="robots" content="noindex" />
    <!--
      ===========================================================================
      展示用 mock 层 —— 不改动控制台一行代码，只在它启动前：
        1. 预置一个假登录 token（绕过登录页，直达仪表盘）
        2. 拦截 fetch，对所有 /api/console/* 返回样例数据
      跑的是真实的控制台前端 bundle，所以视觉与交互与线上完全一致。
      数据均为演示用，与任何真实部署无关。
      ===========================================================================
    -->
    <script>
    (function () {
      // ---- 0. 路径矫正（关键：消除空白页）---------------------------------
      // 控制台用 react-router 的 BrowserRouter basename="/console"，只有当浏览器
      // 路径在 /console 下时才能匹配到路由，否则渲染空白。经 Cloudflare 重写到
      // 根文件、或直接打开外壳文件时，路径可能不在 /console 下 —— 这里在 bundle
      // 启动前强制把路径纠正为 /console/，basename 即可匹配，永不空白。
      var p = location.pathname;
      if (p !== "/console" && p.indexOf("/console/") !== 0) {
        try { history.replaceState(null, "", "/console/" + location.search + location.hash); } catch (e) {}
      }

      // ---- 1. 预置假会话：控制台启动时读 token → 调 /me 成功 → 直达仪表盘 ----
      localStorage.setItem("mcp-switch.console.token", "demo-showcase-token");
      localStorage.setItem("mcp-switch.console.user", "admin");

      // ---- 2. 样例数据 -------------------------------------------------------
      var now = Date.now();
      var iso = function (msAgo) { return new Date(now - msAgo).toISOString(); };
      var min = 60000, hour = 60 * min, day = 24 * hour;

      var SKILLS = [
        // 本地内置
        ["weather_current","当前天气","sense","local",true,"按城市返回实时天气",false,null,null,null],
        ["location_current","当前位置","sense","local",true,"最近一次定位",false,null,null,null],
        ["device_status","设备状态","sense","local",true,"在线设备与电量",false,null,null,null],
        ["device_timeline","设备时间线","history","local",true,"跨端活动时间线",false,null,null,null],
        ["health_summary","健康概览","personal","local",true,"步数 / 睡眠 / 心率摘要",false,null,null,null],
        ["time_log_range","时间日志","history","local",true,"区间内的时间记录",false,null,null,null],
        ["x_search","X / Twitter 搜索","search","local",true,"检索推文",false,null,null,null],
        ["steam_profile","Steam 资料","personal","local",true,"Steam 个人资料",false,null,null,null],
        // 远程 MCP 工具
        ["rmcp__sticker__send_sticker","sticker: 发送表情","action","remote-mcp",true,"在对话里发表情包",true,false,"sticker","Sticker"],
        ["rmcp__sticker__list_available_stickers","sticker: 列出表情","remote","remote-mcp",true,"按心情检索表情",true,true,"sticker","Sticker"],
        ["rmcp__music__play_song","music: 播放歌曲","action","remote-mcp",true,"对话内播放音乐",true,false,"music","Music"],
        ["rmcp__music__search_song","music: 搜索歌曲","remote","remote-mcp",true,"搜索曲库",true,true,"music","Music"],
        ["rmcp__voice__voice_send","voice: 发送语音","action","remote-mcp",true,"生成可播放语音气泡",true,false,"voice","Voice"],
        ["rmcp__reel__spin_picker","reel: 转盘抽选","action","remote-mcp",true,"老虎机 / 转盘抽选",true,false,"reel","Reel"],
        ["rmcp__steam__getAppDetails","steam: 游戏详情","remote","remote-mcp",true,"Steam 应用详情",true,true,"steam","Steam"],
        ["rmcp__steam__searchApps","steam: 搜索游戏","remote","remote-mcp",false,"搜索 Steam 应用",true,true,"steam","Steam"],
      ].map(function (r, i) {
        return {
          skillId: r[0], title: r[1], category: r[2], source: r[3], enabled: r[4],
          description: r[5], allowWrite: r[6], readOnly: r[7], serverId: r[8],
          serverName: r[9], sortOrder: i, updatedAt: iso(i * hour),
        };
      });

      var AGENTS = [
        ["claude-desktop","Claude Desktop","assistant",true,iso(3*day),iso(12*min)],
        ["claude-ai-web","claude.ai (Web)","assistant",true,iso(9*day),iso(2*hour)],
        ["chatgpt","ChatGPT Connector","assistant",true,iso(20*day),iso(1*day)],
        ["cline-vscode","Cline · VS Code","coding",true,iso(5*day),iso(40*min)],
        ["test-agent","Test Agent","custom",false,null,iso(15*day)],
      ].map(function (r) {
        return {
          agentId: r[0], displayName: r[1], role: r[2], enabled: r[3],
          createdAt: iso(30*day), lastAuthorizedAt: r[4], lastUsedAt: r[5],
        };
      });

      var REMOTE = [
        {
          id:"sticker", name:"Sticker MCP", url:"https://sticker.asashiki.com/mcp",
          description:"对话内表情包 + 管理后台", status:"ok", transport:"http",
          authMode:"oauth", oauthAuthorized:true, lastError:null, toolCount:4,
          tools:[
            {name:"send_sticker",title:"Send Sticker",description:"发送一张表情",readOnlyHint:false,inputSchema:{}},
            {name:"list_available_stickers",title:"List Stickers",description:"按心情检索",readOnlyHint:true,inputSchema:{}},
            {name:"add_sticker",title:"Add Sticker",description:"上传新表情",readOnlyHint:false,inputSchema:{}},
            {name:"create_sticker_upload",title:"Create Upload URL",description:"获取上传地址",readOnlyHint:false,inputSchema:{}},
          ],
        },
        {
          id:"music", name:"Music MCP", url:"https://music.asashiki.com/mcp",
          description:"对话内音乐播放器（Meting 源）", status:"ok", transport:"http",
          authMode:"bearer", lastError:null, toolCount:3,
          tools:[
            {name:"search_song",title:"Search Songs",description:"搜索曲目",readOnlyHint:true,inputSchema:{}},
            {name:"play_song",title:"Play Song",description:"播放歌曲",readOnlyHint:false,inputSchema:{}},
            {name:"play_playlist",title:"Play Playlist",description:"播放歌单",readOnlyHint:false,inputSchema:{}},
          ],
        },
        {
          id:"voice", name:"Voice Send MCP", url:"https://voice.asashiki.com/mcp",
          description:"多家 TTS 语音气泡", status:"ok", transport:"http",
          authMode:"bearer-env", envKeys:["MINIMAX_API_KEY"], lastError:null, toolCount:1,
          tools:[{name:"voice_send",title:"Send Voice",description:"生成语音",readOnlyHint:false,inputSchema:{}}],
        },
        {
          id:"reel", name:"Reel Rando MCP", url:"(stdio)", description:"老虎机 / 转盘抽选",
          status:"ok", transport:"stdio", command:"node", args:["reel-mcp/dist/server.js"],
          authMode:"none", lastError:null, toolCount:1,
          tools:[{name:"spin_picker",title:"Spin Picker",description:"抽选",readOnlyHint:false,inputSchema:{}}],
        },
        {
          id:"steam", name:"Steam MCP", url:"https://steam.example.com/mcp",
          description:"Steam 游戏数据", status:"warn", transport:"http",
          authMode:"oauth", needsAuth:true, oauthAuthorized:false,
          lastError:"token expired · re-authorize", toolCount:12, tools:[],
        },
      ];

      var GROUPS = [
        { id:"g-fun",  name:"对话玩法 🎉", order:0, skillIds:["rmcp__sticker__send_sticker","rmcp__voice__voice_send","rmcp__reel__spin_picker"] },
        { id:"g-music",name:"音乐 🎵",    order:1, skillIds:["rmcp__music__play_song","rmcp__music__search_song"] },
        { id:"g-me",   name:"我的数据 📊", order:2, skillIds:["health_summary","device_status","location_current","time_log_range"] },
      ];

      var TOP_TOOLS = [
        ["rmcp__sticker__send_sticker","sticker: 发送表情",842],
        ["rmcp__music__play_song","music: 播放歌曲",523],
        ["weather_current","当前天气",311],
        ["rmcp__voice__voice_send","voice: 发送语音",268],
        ["device_status","设备状态",204],
        ["rmcp__reel__spin_picker","reel: 转盘抽选",176],
        ["location_current","当前位置",141],
        ["health_summary","健康概览",98],
      ];

      // 24h 折线：48 个半小时点，带日间波形
      var TIMELINE = [];
      for (var i = 47; i >= 0; i--) {
        var hourOfDay = new Date(now - i * 30 * min).getHours();
        var base = 18 + 26 * Math.max(0, Math.sin((hourOfDay - 6) / 24 * Math.PI * 2));
        TIMELINE.push({ t: Math.floor((now - i * 30 * min) / 1000), n: Math.round(base + Math.random() * 12) });
      }
      var TOTAL = TIMELINE.reduce(function (a, p) { return a + p.n; }, 0);

      var STATS = {
        range: "24h", totalCalls: TOTAL, errorCalls: 23, unauthorizedCalls: 4,
        p50LatencyMs: 86, p95LatencyMs: 412,
        timeline: TIMELINE, topTools: TOP_TOOLS.map(function (r) { return { skillId: r[0], title: r[1], count: r[2] }; }),
        byAgent: [
          { agentId:"claude-desktop", displayName:"Claude Desktop", count:1284, pct:0.46 },
          { agentId:"claude-ai-web", displayName:"claude.ai (Web)", count:712, pct:0.255 },
          { agentId:"chatgpt", displayName:"ChatGPT Connector", count:438, pct:0.157 },
          { agentId:"cline-vscode", displayName:"Cline · VS Code", count:241, pct:0.086 },
          { agentId:"_other", displayName:"其它", count:118, pct:0.042 },
        ],
        deltaVsPrev: { totalCalls: 0.124, errorCalls: -0.08, p95LatencyMs: -34 },
      };

      var HEALTH = {
        gateway: { ok: true, uptime: "11d 4h", note: "node 24 · :4200" },
        connectors: [
          { id:"remote-mcp-sticker", name:"Sticker MCP", status:"ok", note:"4 tools · last ok 12s ago" },
          { id:"remote-mcp-music", name:"Music MCP", status:"ok", note:"3 tools · last ok 1m ago" },
          { id:"remote-mcp-voice", name:"Voice Send MCP", status:"ok", note:"1 tool · last ok 4m ago" },
          { id:"remote-mcp-reel", name:"Reel Rando MCP", status:"ok", note:"stdio · 1 tool" },
          { id:"remote-mcp-steam", name:"Steam MCP", status:"warn", note:"token expired · re-authorize" },
        ],
      };

      var ACTIONS = ["tool_call","mcp_request","tool_call","tool_call","token_refreshed","tool_call","mcp_unauthorized","tool_call","remote_rediscover","tool_call"];
      var TOOLS_FOR_AUDIT = ["rmcp__sticker__send_sticker","rmcp__music__play_song","weather_current","rmcp__voice__voice_send","device_status","rmcp__reel__spin_picker",null,"location_current",null,"health_summary"];
      var AUDIT_AGENTS = ["claude-desktop","claude-ai-web","chatgpt","cline-vscode"];
      var AUDIT = [];
      for (var j = 0; j < 60; j++) {
        var a = ACTIONS[j % ACTIONS.length];
        var unauthorized = a === "mcp_unauthorized";
        var fail = unauthorized || (j % 17 === 0);
        AUDIT.push({
          created_at: iso(j * 7 * min + Math.floor(Math.random() * min)),
          agent_id: AUDIT_AGENTS[j % AUDIT_AGENTS.length],
          client_id: "client_" + (1000 + (j % 4)),
          tool_name: TOOLS_FOR_AUDIT[j % TOOLS_FOR_AUDIT.length],
          action: a,
          success: fail ? 0 : 1,
          latency_ms: fail ? null : 40 + Math.floor(Math.random() * 380),
          detail: unauthorized ? "agent not in allowlist" : (fail ? "upstream timeout" : null),
        });
      }

      // ---- 3. 路由表：把请求路径映射到样例数据 ------------------------------
      function route(path, method) {
        if (path === "/api/console/me") return { username: "admin" };
        if (path === "/api/console/skills") return { skills: SKILLS };
        if (path === "/api/console/agents") return { agents: AGENTS };
        if (path === "/api/console/remote") return { servers: REMOTE };
        if (path === "/api/console/skill-groups") return { groups: GROUPS };
        if (path === "/api/console/health") return HEALTH;
        if (path.indexOf("/api/console/stats") === 0) return STATS;
        if (path.indexOf("/api/console/audit") === 0) return { entries: AUDIT };
        if (/\/visibility$/.test(path) && method === "GET") {
          return { agentId: path.split("/")[4], restricted: false, allowlist: [], enabledSkills: SKILLS.map(function (s) { return s.skillId; }) };
        }
        if (path === "/api/console/logout") return { ok: true };
        // 其余写操作：返回温和成功，避免展示页报错（演示不落库）
        return { ok: true, demo: true };
      }

      // ---- 4. 拦截 fetch ----------------------------------------------------
      var realFetch = (typeof window.fetch === "function")
        ? window.fetch.bind(window)
        : function () { return Promise.reject(new Error("no fetch")); };
      window.fetch = function (input, init) {
        var url = typeof input === "string" ? input : (input && input.url) || "";
        var method = (init && init.method) || (typeof input !== "string" && input && input.method) || "GET";
        if (url.indexOf("/api/console/") !== -1) {
          var path = url.replace(/^https?:\/\/[^/]+/, "").split("#")[0];
          var data = route(path, method);
          return Promise.resolve(new Response(JSON.stringify(data), {
            status: 200, headers: { "Content-Type": "application/json" },
          }));
        }
        return realFetch(input, init);
      };
    })();
    </script>
    <script type="module" crossorigin src="/console/assets/index-DmGHPaU1.js"></script>
    <link rel="stylesheet" crossorigin href="/console/assets/index-DP9zHfTr.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
